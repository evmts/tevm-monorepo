name: Daily Claude Auto-Updates
on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering
    
env:
  NODE_OPTIONS: "--max_old_space_size=4096"
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TEVM_RPC_URLS_MAINNET: ${{ secrets.TEVM_RPC_URLS_MAINNET }}
  TEVM_RPC_URLS_OPTIMISM: ${{ secrets.TEVM_RPC_URLS_OPTIMISM }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  update:
    name: Run Claude Updates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup
        uses: ./.github/actions/setup
      
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
        shell: bash

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        shell: bash
      
      - name: Run Claude Code on update files
        id: claude
        run: |
          set -euo pipefail

          # Set up flag to track if any changes were made
          CHANGES_MADE=0
          
          # Find all update-* files in the .claude/commands directory
          UPDATE_FILES=$(find .claude/commands -maxdepth 1 -type f -name "update-*" | sort)
          
          # Process each update file
          while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi

            echo "Processing $file..."
            
            # Run Claude Code with the update file contents.
            CLAUDE_OUTPUT=$(mktemp)
            if ! claude --print --permission-mode bypassPermissions < "$file" > "$CLAUDE_OUTPUT" 2>&1; then
              cat "$CLAUDE_OUTPUT"

              if grep -qi "Credit balance is too low" "$CLAUDE_OUTPUT"; then
                echo "::warning title=Claude auto-update skipped::Claude API credit balance is too low; skipping automated updates."
                CHANGES_MADE=0
                rm -f "$CLAUDE_OUTPUT"
                break
              fi

              rm -f "$CLAUDE_OUTPUT"
              exit 1
            fi
            cat "$CLAUDE_OUTPUT"
            rm -f "$CLAUDE_OUTPUT"
            
            # Check if changes were made
            if [ -n "$(git status --porcelain)" ]; then
              CHANGES_MADE=1
            else
              echo "No changes from processing $file"
            fi
          done <<< "$UPDATE_FILES"
          
          # Set output for use in later steps
          echo "CHANGES_MADE=$CHANGES_MADE" >> "$GITHUB_OUTPUT"
        shell: bash
      
      - name: Push changes to main
        if: steps.claude.outputs.CHANGES_MADE == '1'
        run: |
          set -euo pipefail

          git add -A

          if git diff --cached --quiet; then
            echo "No staged changes to commit"
            exit 0
          fi

          git commit -m "chore: apply daily Claude updates"
          git pull --rebase origin main
          git push origin HEAD:main
        shell: bash
      
      - name: Cleanup if no changes
        if: steps.claude.outputs.CHANGES_MADE == '0'
        run: |
          echo "No changes were made"
        shell: bash
