name: Version 🔖

on:
  workflow_dispatch:
  push:
    branches:
      - v1

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version 🔖
    if: github.repository == 'evmts/tevm-monorepo'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        name: Checkout Repo
        with:
          fetch-depth: 0
          submodules: recursive

      - name: "Setup"
        uses: ./.github/actions/setup

      - name: Check for pre.json file existence
        id: check_files
        uses: andstor/file-existence-action@v3.0.0
        with:
          files: ".changeset/pre.json"

      - name: Prepare npm trusted publishing
        run: |
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ]; then
            rm -f "${NPM_CONFIG_USERCONFIG}"
          fi
          {
            echo "NPM_CONFIG_PROVENANCE=true"
            echo "NPM_CONFIG_USERCONFIG="
            echo "NODE_AUTH_TOKEN="
          } >> "${GITHUB_ENV}"

      - name: Handle Release Pull Request or Publish to npm
        id: changesets
        if: steps.check_files.outputs.files_exists == 'false'
        uses: changesets/action@v1
        with:
          title: "chore: Version packages 🔖"
          commit: "chore: Version packages 🔖"
          publish: bun release:publish
          version: bun release:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
