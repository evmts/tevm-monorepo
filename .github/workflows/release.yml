name: Version 🔖

on:
  workflow_dispatch:
  push:
    branches:
      - v1

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version 🔖
    if: github.repository == 'evmts/tevm-monorepo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout Repo
        with:
          fetch-depth: 0
          submodules: recursive

      - name: "Setup"
        uses: ./.github/actions/setup

      - name: Check for pre.json file existence
        id: check_files
        uses: andstor/file-existence-action@v3.0.0
        with:
          files: ".changeset/pre.json"

      - name: Configure npm registry token
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN is not configured"
            exit 1
          fi
          printf '\n//registry.npmjs.org/:_authToken=%s\n' "${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Handle Release Pull Request or Publish to npm
        id: changesets
        if: steps.check_files.outputs.files_exists == 'false'
        uses: changesets/action@v1
        with:
          title: "chore: Version packages 🔖"
          commit: "chore: Version packages 🔖"
          publish: bun release:publish
          version: bun release:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
