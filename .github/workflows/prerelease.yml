name: Prerelease 🚀

on:
  push:
    branches:
      # Target main branch
      - "main"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prerelease:
    name: Changests Prerelease
    if: github.repository == 'evmts/tevm-monorepo'
    runs-on: ubuntu-latest
    # Permissions necessary for Changesets to push a new branch and open PRs
    # (for automated Version Packages PRs), and request the JWT for provenance.
    # More info: https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/about-security-hardening-with-openid-connect#adding-permissions-settings
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        name: Checkout Repo
        with:
          submodules: recursive

      - name: "Setup"
        uses: ./.github/actions/setup

      - name: Configure npm publishing auth
        run: |
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ]; then
            rm -f "${NPM_CONFIG_USERCONFIG}"
          fi

          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            printf '\n//registry.npmjs.org/:_authToken=%s\n' "${NODE_AUTH_TOKEN}" >> ~/.npmrc
          else
            echo "NODE_AUTH_TOKEN=" >> "${GITHUB_ENV}"
          fi

          {
            echo "NPM_CONFIG_PROVENANCE=true"
            echo "NPM_CONFIG_USERCONFIG="
          } >> "${GITHUB_ENV}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check for pre.json file existence
        id: check_files
        uses: andstor/file-existence-action@v3.0.0
        with:
          files: ".changeset/pre.json"

      - name: Enter next prerelease mode
        # If .changeset/pre.json does not exist and we did not recently exit
        # prerelease mode, enter prerelease mode with tag next
        if: steps.check_files.outputs.files_exists == 'false' && !contains(github.event.head_commit.message, 'Exit prerelease')
        run: npx changeset pre enter next

      - name: Create next version PR or publish 🚀
        uses: changesets/action@v1
        with:
          version: bun run release:version
          publish: bun run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
