name: Parity Suites

on:
  pull_request:
  workflow_dispatch:

env:
  TEVM_TEST_ALCHEMY_KEY: ${{ secrets.TEVM_TEST_ALCHEMY_KEY }}
  TEVM_RPC_URLS_MAINNET: ${{ secrets.TEVM_RPC_URLS_MAINNET }}
  TEVM_RPC_URLS_OPTIMISM: ${{ secrets.TEVM_RPC_URLS_OPTIMISM }}

jobs:
  parity-rpc-fast:
    name: Parity RPC Fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Run RPC parity fast subset
        run: PARITY_ARTIFACT_DIR=artifacts/parity pnpm test:parity:rpc
      - name: Upload parity RPC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-rpc-fast-artifacts
          path: artifacts/parity/rpc
          if-no-files-found: warn

  parity-conformance-all:
    name: Parity Conformance (all)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Run full conformance suite (general-state-tests + execution-spec-tests, all hardforks/groups)
        run: PARITY_ARTIFACT_DIR=artifacts/parity pnpm test:conformance:all
      - name: Upload parity state-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-state-tests-all-artifacts
          path: |
            artifacts/parity/state-tests
            artifacts/general-state-tests
            artifacts/execution-spec-tests
          if-no-files-found: warn

  parity-hive-smoke:
    name: Parity Hive Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Run Hive smoke subset
        run: PARITY_ARTIFACT_DIR=artifacts/parity pnpm test:hive:smoke
      - name: Upload parity Hive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-hive-smoke-artifacts
          path: |
            artifacts/parity/hive
            test/hive/artifacts
          if-no-files-found: warn

  # parity-fast-aggregate removed: superseded by parity-conformance-all which
  # runs the full general-state-tests + execution-spec-tests suites (no subset).
  # If hive is installed in CI, restore a parity-full-aggregate job that runs
  # `pnpm test:parity:full` (state-tests:all + execspec:all + hive rpc-compat).
